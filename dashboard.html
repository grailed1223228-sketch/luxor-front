<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXOR INVEST — Dashboard TEST</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #fafafa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #c9a84c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            background: #c9a84c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #b8943a;
        }
        .status {
            padding: 10px;
            background: #e8f5e8;
            border-left: 4px solid #2d8f3e;
            margin-bottom: 20px;
        }
        #console {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ LUXOR INVEST</h1>
            <h2>Dashboard v2.0 - Backend Integration Test</h2>
        </div>
        
        <div class="status">
            <strong>✅ Status:</strong> <span id="connectionStatus">Testing connection...</span>
        </div>
        
        <div class="card">
            <h3>🔧 Backend Integration Test</h3>
            <p>Testing connection to: <strong>https://luxor-backend-production.up.railway.app/api</strong></p>
            <button class="btn" onclick="testAPI()">Test API Connection</button>
            <button class="btn" onclick="testTelegram()">Test Telegram</button>
            <button class="btn" onclick="createTestUser()">Create Test User</button>
            <button class="btn" onclick="clearLogs()">Clear Logs</button>
        </div>
        
        <div class="card">
            <h3>💰 Wallet Balance</h3>
            <div style="font-size: 24px; color: #c9a84c; margin: 10px 0;">
                $<span id="balance">0</span>
            </div>
            <button class="btn" onclick="simulateDeposit()">Simulate +$1000 Deposit</button>
            <button class="btn" onclick="simulateWithdraw()">Simulate -$500 Withdraw</button>
        </div>
        
        <div class="card">
            <h3>📝 Console Logs</h3>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'https://luxor-backend-production.up.railway.app/api';
        const TG_BOT_TOKEN = '8621806564:AAE_gGGOAdk4gaSpQY070GuKoCsinCySXUM';
        const TG_CHAT_ID = '-4580127019';

        let balance = 0;

        function log(message) {
            const console = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            console.textContent += `[${timestamp}] ${message}\n`;
            console.scrollTop = console.scrollHeight;
            console.log(message);
        }

        function clearLogs() {
            document.getElementById('console').textContent = '';
        }

        async function testAPI() {
            log('🔄 Testing API connection...');
            document.getElementById('connectionStatus').textContent = 'Testing API...';
            
            try {
                const response = await fetch(`${API_BASE}/user/test123`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                log(`📡 API Response: ${response.status} ${response.statusText}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ API SUCCESS: ${JSON.stringify(data)}`);
                    document.getElementById('connectionStatus').textContent = 'API Connected ✅';
                } else {
                    log(`⚠️ API Response not OK: ${response.status}`);
                    const text = await response.text();
                    log(`Response body: ${text}`);
                    document.getElementById('connectionStatus').textContent = `API Error ${response.status} ❌`;
                }
            } catch (error) {
                log(`❌ API Error: ${error.message}`);
                document.getElementById('connectionStatus').textContent = 'API Error ❌';
            }
        }

        async function testTelegram() {
            log('🔄 Testing Telegram notifications...');
            
            try {
                const message = `🧪 <b>TEST NOTIFICATION</b>\n\nTimestamp: ${new Date().toLocaleString()}\nFrom: Dashboard Test Page\nStatus: Testing backend integration`;
                
                const response = await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TG_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Telegram notification sent successfully!');
                    log(`Telegram response: ${JSON.stringify(data.result)}`);
                } else {
                    log(`❌ Telegram error: ${response.status}`);
                }
                
            } catch (error) {
                log(`❌ Telegram Error: ${error.message}`);
            }
        }

        async function createTestUser() {
            log('🔄 Creating test user...');
            
            try {
                const response = await fetch(`${API_BASE}/user/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        login: 'testuser_' + Date.now(),
                        balance: 1000,
                        totalBalance: 1000,
                        freeBalance: 0,
                        hasDeposited: false,
                        transactions: [],
                        positions: [],
                        items: []
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Test user created successfully!');
                    log(`User data: ${JSON.stringify(data)}`);
                } else {
                    log(`❌ Create user error: ${response.status}`);
                    const text = await response.text();
                    log(`Response: ${text}`);
                }
                
            } catch (error) {
                log(`❌ Create User Error: ${error.message}`);
            }
        }

        function simulateDeposit() {
            balance += 1000;
            document.getElementById('balance').textContent = balance.toLocaleString();
            log('💰 Simulated +$1000 deposit');
        }

        function simulateWithdraw() {
            balance = Math.max(0, balance - 500);
            document.getElementById('balance').textContent = balance.toLocaleString();
            log('💸 Simulated -$500 withdrawal');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Dashboard Test Page Loaded');
            log('🔧 Backend: ' + API_BASE);
            log('📱 Telegram Bot: ' + TG_BOT_TOKEN.substring(0, 10) + '...');
            
            // Auto-test API connection
            setTimeout(testAPI, 1000);
        });
    </script>
</body>
</html>

<!--
═══════════════════════════════════════════════════════════════════
  LUXOR — REGISTRATION CURRENCY PICKER
═══════════════════════════════════════════════════════════════════

ИНСТРУКЦИЯ ДЛЯ ВСТАВКИ:
─────────────────────────
1. Найди в твоём index.html форму регистрации (где Email + Password + Confirm)
2. Добавь блок CURRENCY SELECTOR (см. ниже) после поля Email и до Password
3. В JS обработчике submit формы — собери выбранную валюту и отправь
   на бэк вместе с email/password (поле preferred_currency)
4. После успешной регистрации сохрани в sessionStorage:
       sessionStorage.setItem('luxor_user', JSON.stringify({...user, preferred_currency: chosen}));
   И в localStorage для немедленного применения на dashboard:
       localStorage.setItem('luxor_currency', chosen);

═══════════════════════════════════════════════════════════════════
-->


<!-- ═════════ CSS — добавить в <style> ═════════ -->
<style>
.luxor-cur-picker{margin:14px 0;padding:14px;background:rgba(201,168,76,.06);border:1px solid var(--bd,#2a2a2a);border-radius:10px}
.luxor-cur-picker-l{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--t3,#888);margin-bottom:8px;display:block}
.luxor-cur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.luxor-cur-opt{padding:12px 10px;background:transparent;border:1.5px solid var(--bd2,#3a3a3a);border-radius:8px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;color:var(--t,#f0ede6)}
.luxor-cur-opt:hover{border-color:var(--gold,#c9a84c)}
.luxor-cur-opt.luxor-cur-active{background:rgba(201,168,76,.12);border-color:var(--gold,#c9a84c);color:var(--gold,#c9a84c)}
.luxor-cur-opt-sym{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;margin-bottom:2px;font-weight:700}
.luxor-cur-opt-name{font-size:9px;letter-spacing:1px;font-family:'Space Mono',monospace}
.luxor-cur-hint{font-size:10px;color:var(--t3,#888);margin-top:8px;font-style:italic;line-height:1.5}
</style>


<!-- ═════════ HTML — вставить в форму регистрации ═════════ -->
<div class="luxor-cur-picker">
  <span class="luxor-cur-picker-l">DISPLAY CURRENCY</span>
  <div class="luxor-cur-grid">
    <button type="button" class="luxor-cur-opt luxor-cur-active" data-cur="USD" onclick="luxorPickCur('USD')">
      <div class="luxor-cur-opt-sym">$</div>
      <div class="luxor-cur-opt-name">USD</div>
    </button>
    <button type="button" class="luxor-cur-opt" data-cur="EUR" onclick="luxorPickCur('EUR')">
      <div class="luxor-cur-opt-sym">€</div>
      <div class="luxor-cur-opt-name">EUR</div>
    </button>
    <button type="button" class="luxor-cur-opt" data-cur="GBP" onclick="luxorPickCur('GBP')">
      <div class="luxor-cur-opt-sym">£</div>
      <div class="luxor-cur-opt-name">GBP</div>
    </button>
  </div>
  <input type="hidden" id="regPreferredCurrency" name="preferred_currency" value="USD">
  <div class="luxor-cur-hint">All amounts on the dashboard will be shown in this currency. You can change it later in Settings.</div>
</div>


<!-- ═════════ JS — добавить в <script> ═════════ -->
<script>
function luxorPickCur(code){
  document.querySelectorAll('.luxor-cur-opt').forEach(b => {
    b.classList.toggle('luxor-cur-active', b.dataset.cur === code);
  });
  const hidden = document.getElementById('regPreferredCurrency');
  if(hidden) hidden.value = code;
}

<!--
═══════════════════════════════════════════════════════════════════
  BACKEND ИНСТРУКЦИЯ
═══════════════════════════════════════════════════════════════════

1. В таблице users добавь колонку:
       preferred_currency VARCHAR(3) DEFAULT 'USD'

2. В endpoint /api/register прими поле preferred_currency:
       INSERT INTO users (..., preferred_currency)
       VALUES (..., $7)
       где $7 = payload.preferred_currency (валидируй: только USD/EUR/GBP)

3. В endpoint /api/login и /api/me возвращай его:
       {
         "user": {
           "login": "savva",
           "preferred_currency": "GBP",
           ...
         }
       }

4. При смене валюты в Settings UI вызывает /api/settings/update
   с полем display_currency (синхронизируем имя поля с фронтом).

═══════════════════════════════════════════════════════════════════
-->
